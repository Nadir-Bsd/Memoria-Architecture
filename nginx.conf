server {
    listen 80;
    server_name server_name;

    # 1. LA VOIE RAPIDE (Spécifique pour le streaming IA)
    # Nginx choisit toujours le chemin le plus long/précis, ce bloc interceptera la route IA
    location /api/note/resume {
        proxy_pass http://backend:80;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # --- LES RÉGLAGES CRITIQUES POUR LE STREAMING ---
        proxy_buffering off;
        proxy_cache off;
        tcp_nodelay on;

        # Garder la connexion ouverte (5 minutes au lieu de 60s par défaut)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        send_timeout 300;

        # Empêcher Nginx de regrouper les paquets
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # 2. API CLASSIQUE (Backend Symfony)
    location /api {
        proxy_pass http://backend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. FRONTEND (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Requis par Next.js pour les WebSockets, le Hot Reload et certaines Server Actions
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}