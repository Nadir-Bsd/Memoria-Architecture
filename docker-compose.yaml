services:
  # 0. LA PASSERELLE (Nginx)
  gateway:
    image: nginx:alpine
    container_name: memoria-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - ia-backend

  # 1. Le Frontend (Next.js)
  frontend:
    image: ghcr.io/nadir-bsd/memoria-frontend:latest
    container_name: memoria-frontend

  # 2. Le Backend (Symfony)
  backend:
    image: ghcr.io/nadir-bsd/memoria-backend:latest
    container_name: memoria-backend
    env_file:
      - .env
    environment:
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - DATABASE_URL=mysql://${DB_USER}:${DB_PASSWORD}@database:3306/Memoria
      - FASTAPI_URL=http://ia-backend:8001

  # 3. L'IA (FastAPI)
  ia-backend:
    image: ghcr.io/nadir-bsd/memoria-ia-backend:latest
    container_name: memoria-ia
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs:ro

  # 4. La Base de Données
  database:
    image: mysql:8.4
    container_name: memoria-database
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: Memoria
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - database_data:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      timeout: 5s
      retries: 5
      start_period: 60s

  # 5. L'IA Locale (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: memoria-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models:ro

volumes:
  database_data:
  ollama_data:

networks:
  default:
    name: memoria-network